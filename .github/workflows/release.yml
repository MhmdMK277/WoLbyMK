name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-app:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: WoLmk-windows-amd64.exe
            binary: build/bin/WoLmk.exe
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: WoLmk-linux-amd64
            binary: build/bin/WoLmk
            # ubuntu-latest ships webkit2gtk 4.1 only, which needs this build tag
            tags: webkit2_41
          - os: macos-latest
            platform: darwin/amd64
            artifact: WoLmk-darwin-amd64
            binary: build/bin/WoLmk.app/Contents/MacOS/WoLmk
          - os: macos-latest
            platform: darwin/arm64
            artifact: WoLmk-darwin-arm64
            binary: build/bin/WoLmk.app/Contents/MacOS/WoLmk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            wails build -platform "${{ matrix.platform }}" -tags "${{ matrix.tags }}"
          else
            wails build -platform "${{ matrix.platform }}"
          fi

      - name: Stage binary
        shell: bash
        run: cp "${{ matrix.binary }}" "${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  build-agent:
    name: Build WoLmk-Agent (all platforms)
    # macOS host: the darwin systray backend needs cgo, so darwin binaries
    # must be built natively; windows and linux are pure Go and cross-compile.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile agent
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o WoLmk-Agent-windows-amd64.exe ./cmd/agent
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o WoLmk-Agent-linux-amd64 ./cmd/agent
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o WoLmk-Agent-darwin-amd64 ./cmd/agent
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o WoLmk-Agent-darwin-arm64 ./cmd/agent

      - uses: actions/upload-artifact@v4
        with:
          name: WoLmk-Agent
          path: WoLmk-Agent-*
          if-no-files-found: error

  release:
    name: Create release
    needs: [build-app, build-agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
