name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-app:
    name: Build ${{ matrix.build.zip }}
    runs-on: ${{ matrix.build.os }}
    strategy:
      fail-fast: false
      matrix:
        build:
          - os: windows-latest
            platform: windows/amd64
            name: WoLmk.exe
            binary: build/bin/WoLmk.exe
            zip: WoLmk_windows_amd64.zip
          - os: ubuntu-latest
            platform: linux/amd64
            name: WoLmk
            binary: build/bin/WoLmk
            zip: WoLmk_linux_amd64.zip
          - os: macos-latest
            platform: darwin/universal
            name: WoLmk
            binary: build/bin/WoLmk.app
            zip: WoLmk_macos_universal.zip
    steps:
      - uses: actions/checkout@v4

      # Pinned to main: the newest tag (v2.2) references the retired
      # actions/upload-artifact@v3, which makes GitHub fail the job at setup,
      # and it hardcodes webkit2gtk 4.0 dev packages that ubuntu-latest
      # (24.04) no longer ships. main uses upload-artifact@v4 and installs
      # the right webkit packages per Ubuntu release, adding the webkit2_41
      # build tag automatically. package is disabled so upload and release
      # are handled by this workflow with our artifact names.
      - name: Build with Wails
        uses: dAppServer/wails-build-action@1ed9cb68d194cf664ce7603fdfa353f287fa981f
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          go-version: "1.25.x"
          node-version: "20.x"
          nsis: "false"
          package: "false"

      - name: Zip binary (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path ${{ matrix.build.binary }} -DestinationPath ${{ matrix.build.zip }}

      - name: Zip binary (Linux)
        if: runner.os == 'Linux'
        run: zip -j "${{ matrix.build.zip }}" "${{ matrix.build.binary }}"

      - name: Zip app bundle (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "${{ matrix.build.binary }}" "${{ matrix.build.zip }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.zip }}
          path: ${{ matrix.build.zip }}
          if-no-files-found: error

  build-agent:
    name: Build WoLmk-Agent (all platforms)
    # macOS host, not Linux: the agent's systray dependency needs cgo on
    # darwin, so the macOS binaries cannot be cross-compiled from a Linux
    # runner. A single macOS runner builds darwin natively and cross-compiles
    # the windows and linux targets, which are pure Go, with GOOS/GOARCH.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile and zip
        run: |
          build() {
            local goos="$1" goarch="$2" cgo="$3" bin="$4" zipname="$5"
            mkdir -p "dist/$goos-$goarch"
            CGO_ENABLED="$cgo" GOOS="$goos" GOARCH="$goarch" \
              go build -ldflags "-s -w" -o "dist/$goos-$goarch/$bin" ./cmd/agent
            (cd "dist/$goos-$goarch" && zip "$GITHUB_WORKSPACE/$zipname" "$bin")
          }
          build windows amd64 0 WoLmk-Agent.exe WoLmk-Agent_windows_amd64.zip
          build linux   amd64 0 WoLmk-Agent     WoLmk-Agent_linux_amd64.zip
          build linux   arm64 0 WoLmk-Agent     WoLmk-Agent_linux_arm64.zip
          build darwin  amd64 1 WoLmk-Agent     WoLmk-Agent_macos_amd64.zip
          build darwin  arm64 1 WoLmk-Agent     WoLmk-Agent_macos_arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: WoLmk-Agent
          path: WoLmk-Agent_*.zip
          if-no-files-found: error

  release:
    name: Create release
    needs: [build-app, build-agent]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.zip > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
