<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WoLmk Web</title>
<style>
:root{
  --base:#0e1015;--surface:#161a22;--raise:#1c212b;--line:#262c38;--line-hi:#333b4b;
  --accent:#8b7cf7;--accent-hi:#9d90fa;--on-accent:#f6f5ff;--text:#eceef4;
  --muted:#9aa3b5;--faint:#5d6575;--ok:#45d18c;--warn:#e8c35a;--err:#f0645c;
  --font:system-ui,"Segoe UI",-apple-system,"SF Pro Text",Roboto,Helvetica,Arial,sans-serif;
  --mono:"Cascadia Mono",Consolas,ui-monospace,"SF Mono",Menlo,monospace;
}
*{box-sizing:border-box}
body{margin:0;background:var(--base);color:var(--text);font-family:var(--font);font-size:14px}
.wrap{max-width:820px;margin:0 auto;padding:24px 20px 60px}
.head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.logo{width:34px;height:34px}
.title{font-size:20px;font-weight:700}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--faint)}
.sub{color:var(--muted);margin:0 0 18px 46px;font-size:13px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.led{width:9px;height:9px;border-radius:50%;background:var(--faint);flex:0 0 auto}
.led.ok{background:var(--ok)}.led.err{background:var(--err)}.led.warn{background:var(--warn)}
.body{flex:1;min-width:180px}
.name{font-weight:700}
.meta{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:3px}
.status{font-size:11px;color:var(--faint);margin-top:4px;min-height:14px}
.status.ok{color:var(--ok)}.status.err{color:var(--err)}.status.warn{color:var(--warn)}
.actions{display:flex;gap:6px;flex-wrap:wrap}
button{font-family:var(--font);font-size:12px;font-weight:600;border:1px solid var(--line);background:var(--raise);color:var(--muted);border-radius:8px;padding:6px 11px;cursor:pointer;transition:all .12s ease}
button:hover{background:var(--line);color:var(--text);border-color:var(--line-hi)}
button.primary{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}
button.primary:hover{background:var(--accent-hi);border-color:var(--accent-hi)}
.empty{color:var(--muted);text-align:center;padding:60px 0}
.foot{color:var(--faint);font-size:12px;margin-top:16px;font-family:var(--mono)}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <svg class="logo" viewBox="0 0 34 34"><rect x="1" y="1" width="32" height="32" rx="9" fill="#8b7cf7"/><path d="M18.6 6.5 L10.4 20.2 H15.4 L12.8 30.5 L22.2 15.6 H16.6 Z" fill="#f6f5ff"/></svg>
    <div><div class="title">WoLmk</div><div class="eyebrow">WAKE ON LAN</div></div>
  </div>
  <p class="sub">Web control panel. Wake and manage your devices from any browser on the network.</p>
  <div id="list"></div>
  <div class="foot" id="foot"></div>
</div>
<script>
const BROADCAST="255.255.255.255";
const listEl=document.getElementById("list");
const footEl=document.getElementById("foot");

function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

async function api(method,path){
  const r=await fetch(path,{method});
  let j={}; try{j=await r.json()}catch(e){}
  if(!r.ok) throw new Error(j.error||("HTTP "+r.status));
  return j;
}

function setStatus(i,kind,text){
  const led=document.querySelector(`#card-${i} .led`);
  const st=document.querySelector(`#card-${i} .status`);
  if(led) led.className="led "+(kind&&kind!=="muted"?kind:"");
  if(st){st.className="status "+kind;st.textContent=text;}
}

async function doAction(i,kind){
  setStatus(i,"warn","Sending "+kind+"...");
  try{await api("POST",`/api/${kind}/${i}`);
    if(kind==="wake") setStatus(i,"ok","Magic packet sent");
    else setStatus(i,"ok",kind+" command sent");
  }catch(e){setStatus(i,"err",kind+" failed: "+e.message);}
}

async function checkStatus(i){
  setStatus(i,"warn","Checking...");
  try{const s=await api("GET",`/api/status/${i}`);
    if(!s.hasTarget){setStatus(i,"err","No device IP set");return;}
    const lbl=s.label?" ("+s.label+")":"";
    const rtt=s.rtt>=0?", "+Math.round(s.rtt)+" ms":"";
    setStatus(i,s.online?"ok":"err",(s.online?"Online":"Offline")+lbl+rtt);
  }catch(e){setStatus(i,"err","Check failed: "+e.message);}
}

function card(d,i){
  const target=d.host===BROADCAST?"LAN broadcast":esc(d.host)+" WAN";
  return `<div class="card" id="card-${i}">
    <div class="led"></div>
    <div class="body">
      <div class="name">${esc(d.name)}</div>
      <div class="meta">${esc(d.mac)}   ${target}   :${esc(d.port)}</div>
      <div class="status"></div>
    </div>
    <div class="actions">
      <button onclick="checkStatus(${i})">Check</button>
      <button onclick="doAction(${i},'sleep')">Sleep</button>
      <button onclick="doAction(${i},'lock')">Lock</button>
      <button onclick="doAction(${i},'reboot')">Reboot</button>
      <button onclick="doAction(${i},'shutdown')">Shutdown</button>
      <button class="primary" onclick="doAction(${i},'wake')">Wake</button>
    </div>
  </div>`;
}

async function load(){
  try{
    const devices=await api("GET","/api/devices")||[];
    if(!devices.length){listEl.innerHTML='<div class="empty">No devices yet. Add them in the desktop app.</div>';}
    else{listEl.innerHTML=devices.map(card).join("");}
    footEl.textContent=devices.length+" device(s). Shared with the desktop app.";
  }catch(e){listEl.innerHTML='<div class="empty">Could not load devices: '+esc(e.message)+'</div>';}
}
load();
</script>
</body>
</html>
